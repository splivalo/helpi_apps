name: helpi_app
description: "Helpi — unified app for seniors and students."
publish_to: "none"

version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  google_places_flutter: ^2.0.9
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
