name: helpi_app
description: "Helpi — unified app for seniors and students."
publish_to: "none"

version: 2.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.2.3
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.4
  google_places_flutter: ^2.0.9
  flutter_dotenv: ^5.2.1
  url_launcher: ^6.3.1
  flutter_riverpod: ^2.6.1
  signalr_netcore: ^1.4.4
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  http: ^1.6.0
  flutter_widget_from_html_core: ^0.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_native_splash:
  color: "#EF5B5B"
  image: assets/images/logo_splash.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#EF5B5B"
    image: assets/images/logo_splash.png
